<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Bhavesh ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  text-align: center;
  font-family: Arial, sans-serif;
  color: white;
  padding-top: 40px;
}

#typing {
  font-size: 32px;
  font-weight: bold;
  height: 40px;
  margin-bottom: 10px;
}

h1 {
  font-size: 42px;
}

#timer {
  font-size: 26px;
  margin: 20px;
  font-weight: bold;
}

/* 📸 Slideshow */
.slideshow {
  width: 85%;
  max-width: 400px;
  height: 400px;
  margin: 20px auto;
  position: relative;
}

.slideshow img {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  position: absolute;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  object-fit: cover;
}

.slideshow img.active {
  opacity: 1;
}

/* Message */
.message {
  font-size: 20px;
  margin-top: 20px;
  width: 80%;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* Heart Beat */
.heart {
  font-size: 45px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}

/* Floating Hearts */
.floating-heart {
  position: fixed;
  bottom: -10px;
  font-size: 22px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="typing"></div>

<h1>Happy Birthday Bhavesh ❤️</h1>

<!-- 📸 Slideshow -->
<div class="slideshow">
  <img src="photo1.jpg" class="active">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<div id="timer"></div>

<div class="message">
My Dearest Bhavesh 💕<br><br>
You are the most special person in my life 🥹<br>
Your smile makes my world brighter ✨<br>
I’m so lucky to have you as mine 💖<br><br>
Forever yours,<br>
<strong>Chuhiya 🐭❤️</strong>
</div>

<div class="heart">❤️</div>

<script>

/* ❤️ Typing Effect */
var text = "Bhavesh I Love You So Much ❤️";
var i = 0;
var speed = 100;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  } else {
    launchConfetti();
  }
}
typeWriter();

/* 🎉 Confetti Explosion */
function launchConfetti() {
  for (let i = 0; i < 120; i++) {
    let conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.left = Math.random() * 100 + "vw";
    conf.style.backgroundColor =
      "hsl(" + Math.random() * 360 + ", 100%, 50%)";
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 3000);
  }
}

/* 💕 Floating Hearts Rain */
setInterval(function() {
  let heart = document.createElement("div");
  heart.className = "floating-heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 400);

/* 🎂 Countdown Timer */
var today = new Date();
var year = today.getFullYear();
var birthday = new Date("March 5, " + year + " 00:00:00");

if (today > birthday) {
  birthday = new Date("March 5, " + (year + 1) + " 00:00:00");
}

setInterval(function() {

var now = new Date().getTime();
var distance = birthday - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
days + " Days 💕 " + hours + " Hours 💖 "
+ minutes + " Minutes ❤️ " + seconds + " Seconds ";

if (distance < 0) {
document.getElementById("timer").innerHTML =
"🎉 IT'S YOUR BIRTHDAY BHAVESH MY LOVE 🎉";
}

}, 1000);

/* 📸 Slideshow Script */
let slides = document.querySelectorAll(".slideshow img");
let current = 0;

setInterval(() => {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}, 3000);

</script>

</body>
</html>
